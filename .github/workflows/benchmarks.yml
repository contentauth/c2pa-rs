name: Benchmarks

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - labeled

env:
  S3_BUCKET: adobe-cai-open-source-c2pa-sdk-test-assets-prod

jobs:
  build:
    name: Build benchmarks
    if: |
      github.event_name != 'pull_request' ||
      github.event.pull_request.author_association == 'COLLABORATOR' ||
      github.event.pull_request.author_association == 'MEMBER' ||
      github.event.pull_request.user.login == 'dependabot[bot]' ||
      contains(github.event.pull_request.labels.*.name, 'safe to test') ||
      contains(github.event.pull_request.labels.*.name, 'check-release') ||
      contains(github.event.pull_request.labels.*.name, 'benchmark')

    runs-on: ubuntu-latest

    env:
      BUILD_MODE: simulation,memory

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install cargo-codspeed
        run: cargo binstall --no-confirm cargo-codspeed

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check codspeed build cache
        id: cache-codspeed-build
        uses: actions/cache@v5
        with:
          path: target/codspeed/
          key: codspeed-build-${{ runner.os }}-${{ hashFiles('**/Cargo.lock', 'sdk/benches/**/*.rs', 'sdk/src/**/*.rs') }}
          lookup-only: true

      - name: Build all benchmark targets
        if: steps.cache-codspeed-build.outputs.cache-hit != 'true'
        run: cargo codspeed build -m $BUILD_MODE -p c2pa --no-default-features --features rust_native_crypto

      - name: Save codspeed build cache
        if: steps.cache-codspeed-build.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: target/codspeed/
          key: codspeed-build-${{ runner.os }}-${{ hashFiles('**/Cargo.lock', 'sdk/benches/**/*.rs', 'sdk/src/**/*.rs') }}

  download-fixtures:
    name: Download bench fixtures
    if: |
      github.event_name != 'pull_request' ||
      github.event.pull_request.author_association == 'COLLABORATOR' ||
      github.event.pull_request.author_association == 'MEMBER' ||
      github.event.pull_request.user.login == 'dependabot[bot]' ||
      contains(github.event.pull_request.labels.*.name, 'safe to test') ||
      contains(github.event.pull_request.labels.*.name, 'check-release') ||
      contains(github.event.pull_request.labels.*.name, 'benchmark')

    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    outputs:
      fixtures-cache-key: ${{ steps.s3-etag.outputs.etag }}

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Get fixture ETag from S3
        id: s3-etag
        run: |
          ETAG=$(aws s3api head-object --bucket ${{ env.S3_BUCKET }} --key bench-fixtures.tar.zst --query ETag --output text)
          echo "etag=$ETAG" >> $GITHUB_OUTPUT

      - name: Check fixture cache
        id: cache-fixtures
        uses: actions/cache@v5
        with:
          path: sdk/benches/fixtures
          key: bench-fixtures-${{ steps.s3-etag.outputs.etag }}
          lookup-only: true

      - name: Download bench fixtures from S3
        if: steps.cache-fixtures.outputs.cache-hit != 'true'
        run: |
          aws s3 cp s3://${{ env.S3_BUCKET }}/bench-fixtures.tar.zst bench-fixtures.tar.zst
          mkdir -p sdk/benches/fixtures
          tar --zstd -xf bench-fixtures.tar.zst -C sdk/benches/fixtures
          rm bench-fixtures.tar.zst

      - name: Save fixture cache
        if: steps.cache-fixtures.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: sdk/benches/fixtures
          key: bench-fixtures-${{ steps.s3-etag.outputs.etag }}

  benchmarks:
    name: Benchmark (${{ matrix.bench }}${{ matrix.format && format('/{0}', matrix.format) || '' }})
    needs: [build, download-fixtures]

    runs-on: ubuntu-latest

    strategy:
      matrix:
        bench: [sign, read]
        format: [jpeg, png, gif, tiff, svg, mp3, mp4, wav]
        include:
          - bench: complex_read
            format: ""
            build_mode: simulation,memory
          # - bench: read
          #   format: jpeg
          #   build_mode: memory
          #   (read+sign jpeg/small - broken: 0 memtrack events with filter)

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install cargo-codspeed
        run: cargo binstall --no-confirm cargo-codspeed

      - name: Restore codspeed build
        uses: actions/cache/restore@v5
        with:
          path: target/codspeed/
          key: codspeed-build-${{ runner.os }}-${{ hashFiles('**/Cargo.lock', 'sdk/benches/**/*.rs', 'sdk/src/**/*.rs') }}
          fail-on-cache-miss: true

      - name: Set binary permissions
        run: chmod +x target/codspeed/analysis/c2pa/*

      - name: Restore bench fixtures
        uses: actions/cache/restore@v5
        with:
          path: sdk/benches/fixtures
          key: bench-fixtures-${{ needs.download-fixtures.outputs.fixtures-cache-key }}
          fail-on-cache-miss: true

      - name: Run the benchmarks
        uses: CodSpeedHQ/action@v4
        with:
          mode: ${{ matrix.build_mode || 'simulation' }}
          run: cargo codspeed run --bench ${{ matrix.bench }} ${{ matrix.format && format('-- "{0} {1}"', matrix.bench, matrix.format) || '' }}
          token: ${{ secrets.CODSPEED_TOKEN }}
