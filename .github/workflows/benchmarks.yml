name: Benchmarks

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - labeled
    paths:
      - "**/*.rs"
      - "**/*.toml"

env:
  S3_BUCKET: adobe-cai-open-source-c2pa-sdk-test-assets-prod

jobs:
  build:
    name: Build benchmarks
    if: |
      github.event_name != 'pull_request' ||
      github.event.pull_request.author_association == 'COLLABORATOR' ||
      github.event.pull_request.author_association == 'MEMBER' ||
      github.event.pull_request.user.login == 'dependabot[bot]' ||
      contains(github.event.pull_request.labels.*.name, 'safe to test') ||
      contains(github.event.pull_request.labels.*.name, 'check-release') ||
      contains(github.event.pull_request.labels.*.name, 'benchmark')

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install cargo-codspeed
        run: cargo binstall --no-confirm cargo-codspeed

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Cache codspeed build
        id: cache-codspeed-build
        uses: actions/cache@v5
        with:
          path: target/codspeed/
          key: codspeed-build-${{ runner.os }}-${{ hashFiles('**/Cargo.lock', 'sdk/benches/**/*.rs', 'sdk/src/**/*.rs') }}

      - name: Build all benchmark targets
        if: steps.cache-codspeed-build.outputs.cache-hit != 'true'
        run: cargo codspeed build -m simulation,memory -p c2pa --no-default-features --features rust_native_crypto

  run:
    name: Benchmark (${{ matrix.name }})
    needs: build

    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - name: sign (simulation)
            mode: simulation
            run: cargo codspeed run --bench sign
          - name: read (simulation)
            mode: simulation
            run: cargo codspeed run --bench read
          - name: complex (simulation,memory)
            mode: simulation,memory
            run: cargo codspeed run --bench complex
          - name: read+sign jpeg (memory)
            mode: memory
            run: cargo codspeed run --bench read --bench sign -- "jpeg/small"

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install cargo-codspeed
        run: cargo binstall --no-confirm cargo-codspeed

      - name: Restore codspeed build
        uses: actions/cache/restore@v5
        with:
          path: target/codspeed/
          key: codspeed-build-${{ runner.os }}-${{ hashFiles('**/Cargo.lock', 'sdk/benches/**/*.rs', 'sdk/src/**/*.rs') }}
          fail-on-cache-miss: true

      - name: Set binary permissions
        run: chmod +x target/codspeed/analysis/c2pa/*

      - name: Get fixture ETag from S3
        id: s3-etag
        run: |
          ETAG=$(aws s3api head-object --bucket ${{ env.S3_BUCKET }} --key bench-fixtures.tar.gz --query ETag --output text)
          echo "etag=$ETAG" >> $GITHUB_OUTPUT

      - name: Cache bench fixtures
        id: cache-fixtures
        uses: actions/cache@v5
        with:
          path: sdk/benches/fixtures
          key: bench-fixtures-${{ steps.s3-etag.outputs.etag }}

      - name: Download and extract bench fixtures from S3
        if: steps.cache-fixtures.outputs.cache-hit != 'true'
        run: |
          aws s3 cp s3://${{ env.S3_BUCKET }}/bench-fixtures.tar.gz bench-fixtures.tar.gz
          mkdir -p sdk/benches/fixtures
          tar -xzf bench-fixtures.tar.gz -C sdk/benches/fixtures
          rm bench-fixtures.tar.gz

      - name: Run the benchmarks
        uses: CodSpeedHQ/action@v4
        with:
          mode: ${{ matrix.mode }}
          run: ${{ matrix.run }}
          token: ${{ secrets.CODSPEED_TOKEN }}
