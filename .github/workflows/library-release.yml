name: Publish c2pa-library binaries

on:
  push:
    tags:
      - "c2pa-v*" # Trigger on version tags (e.g., v1.0.0)
  workflow_dispatch:

jobs:
  build:
    name: Publish c2pa-library binaries
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: universal-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: windows-11-arm
            target: aarch64-pc-windows-msvc
          - os: macos-latest
            target: aarch64-apple-ios
          - os: macos-latest
            target: x86_64-apple-ios
          - os: macos-latest
            target: aarch64-apple-ios-sim
          - os: ubuntu-latest
            target: aarch64-linux-android
          - os: ubuntu-latest
            target: armv7-linux-androideabi
          - os: ubuntu-latest
            target: i686-linux-android
          - os: ubuntu-latest
            target: x86_64-linux-android
          - os: ubuntu-latest
            target: wasm32-unknown-emscripten

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # Use a separate target directory for Android cross builds to prevent
      # host-compiled build scripts from being reused inside the cross Docker
      # container, which causes glibc version mismatches on x86_64 targets.
      # See: https://github.com/cross-rs/cross/issues/724
      - name: Set CARGO_TARGET_DIR for Android builds
        if: contains(matrix.target, 'android')
        run: |
          echo "CARGO_TARGET_DIR=${{ github.workspace }}/target-${{ matrix.target }}" >> $GITHUB_ENV
          echo "TARGET_DIR=${{ github.workspace }}/target-${{ matrix.target }}" >> $GITHUB_ENV

      - name: Set up Emscripten
        if: matrix.target == 'wasm32-unknown-emscripten'
        run: |
          git clone https://github.com/emscripten-core/emsdk.git $GITHUB_WORKSPACE/emsdk
          cd $GITHUB_WORKSPACE/emsdk
          ./emsdk install latest
          ./emsdk activate latest
          source ./emsdk_env.sh
          echo "PATH=$PATH" >> $GITHUB_ENV
          emcc --version
          rustup install nightly
          rustup component add rust-src --toolchain nightly
          rustup target add --toolchain nightly wasm32-unknown-emscripten

      - name: Cache emsdk
        if: matrix.target == 'wasm32-unknown-emscripten'
        uses: actions/cache@v4
        with:
          path: ~/emsdk
          key: emsdk-${{ runner.os }}-latest

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build Windows release
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          ./make_release.ps1

      - name: Build Windows ARM release
        if: matrix.os == 'windows-11-arm'
        shell: pwsh
        run: |
          $env:TARGET_ARCH = "aarch64"
          ./make_release.ps1

      - name: Build emscripten release
        if: matrix.target == 'wasm32-unknown-emscripten'
        env:
          RUSTFLAGS: -C target-feature=+atomics,+bulk-memory -C link-arg=-pthread -C link-arg=-sUSE_PTHREADS=1 -C link-arg=-sSIDE_MODULE=1 -C link-arg=-flto
        run: make release TARGET=${{ matrix.target }}
        working-directory: ./c2pa_c_ffi

      - name: Build release
        if: matrix.os != 'windows-latest' && matrix.os != 'windows-11-arm' && matrix.os != 'wasm32-unknown-emscripten'
        run: make release TARGET=${{ matrix.target }}

      - name: Upload build artifacts (Android)
        if: contains(matrix.target, 'android')
        uses: actions/upload-artifact@v7
        with:
          name: release-artifacts-${{ matrix.os }}-${{ matrix.target }}
          path: target-${{ matrix.target }}/artifacts/

      - name: Upload build artifacts (Non-Android)
        if: "!contains(matrix.target, 'android')"
        uses: actions/upload-artifact@v7
        with:
          name: release-artifacts-${{ matrix.os }}-${{ matrix.target }}
          path: target/artifacts/

  release:
    needs: build
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: release-artifacts-*
          path: .
          merge-multiple: true

      - name: List downloaded artifacts
        run: ls -lh

      - name: Extract tag_name from zip file
        id: extract_tag
        run: |
          ZIP=$(find . -name "c2pa-v*-*.zip" | head -n1)
          if [ -n "$ZIP" ]; then
            TAG_NAME=$(echo "$ZIP" | sed -E 's/.*\/(c2pa-v[0-9]+\.[0-9]+\.[0-9]+)-.*\.zip/\1/')
            echo "Found tag: $TAG_NAME"
            echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          else
            echo "No zip files found"
            exit 1
          fi

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.extract_tag.outputs.tag_name }}

          files: ./*
          draft: false
          prerelease: true
          generate_release_notes: true

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
