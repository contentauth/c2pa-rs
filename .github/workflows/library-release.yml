name: Publish c2pa-library binaries

# Triggered by `c2pa-v*` tags, which come from two places (see
# docs/release-process.md):
#   * release-plz, on a release-line branch -> a real tag like `c2pa-v0.90.0`.
#   * release-rc.yml, when a release-candidate build is cut -> a prerelease tag
#     like `c2pa-v0.90.0-rc.1`.
# Either way the binaries are built here; the GitHub release is always marked as
# a prerelease (pre-1.0). Nothing here publishes to crates.io. Git tags are
# repo-global, so no branch filter is needed.

on:
  push:
    tags:
      - "c2pa-v*" # Trigger on version tags (e.g., c2pa-v0.90.0)
  workflow_dispatch:

jobs:
  build:
    name: Publish c2pa-library binaries
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: universal-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: windows-11-arm
            target: aarch64-pc-windows-msvc
          - os: macos-latest
            target: aarch64-apple-ios
          - os: macos-latest
            target: x86_64-apple-ios
          - os: macos-latest
            target: aarch64-apple-ios-sim
          - os: macos-latest
            target: aarch64-apple-ios-macabi
          - os: macos-latest
            target: x86_64-apple-ios-macabi
          - os: ubuntu-latest
            target: aarch64-linux-android
          - os: ubuntu-latest
            target: armv7-linux-androideabi
          - os: ubuntu-latest
            target: i686-linux-android
          - os: ubuntu-latest
            target: x86_64-linux-android
          - os: ubuntu-latest
            target: wasm32-unknown-emscripten

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master@2026-06-30
        with:
          toolchain: stable

      # Use a separate target directory for Android cross builds to prevent
      # host-compiled build scripts from being reused inside the cross Docker
      # container, which causes glibc version mismatches on x86_64 targets.
      # See: https://github.com/cross-rs/cross/issues/724
      - name: Set CARGO_TARGET_DIR for Android builds
        if: contains(matrix.target, 'android')
        run: |
          echo "CARGO_TARGET_DIR=${{ github.workspace }}/target-${{ matrix.target }}" >> $GITHUB_ENV
          echo "TARGET_DIR=${{ github.workspace }}/target-${{ matrix.target }}" >> $GITHUB_ENV

      - name: Set up Emscripten
        if: matrix.target == 'wasm32-unknown-emscripten'
        run: |
          git clone https://github.com/emscripten-core/emsdk.git $GITHUB_WORKSPACE/emsdk
          cd $GITHUB_WORKSPACE/emsdk
          ./emsdk install latest
          ./emsdk activate latest
          source ./emsdk_env.sh
          echo "PATH=$PATH" >> $GITHUB_ENV
          emcc --version
          rustup install nightly
          rustup component add rust-src --toolchain nightly
          rustup target add --toolchain nightly wasm32-unknown-emscripten

      - name: Cache emsdk
        if: matrix.target == 'wasm32-unknown-emscripten'
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5.1.0
        with:
          path: ~/emsdk
          key: emsdk-${{ runner.os }}-latest

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Build Windows release
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          ./make_release.ps1

      - name: Build Windows ARM release
        if: matrix.os == 'windows-11-arm'
        shell: pwsh
        run: |
          $env:TARGET_ARCH = "aarch64"
          ./make_release.ps1

      - name: Build emscripten release
        if: matrix.target == 'wasm32-unknown-emscripten'
        run: make release TARGET=${{ matrix.target }}
        working-directory: ./c2pa_c_ffi

      - name: Build release
        if: matrix.os != 'windows-latest' && matrix.os != 'windows-11-arm' && matrix.target != 'wasm32-unknown-emscripten'
        run: make release TARGET=${{ matrix.target }}

      - name: Build Linux .deb and .rpm packages
        if: contains(matrix.target, 'unknown-linux-gnu')
        run: |
          sudo apt-get install -y rpm ruby-dev build-essential
          sudo gem install fpm --no-document

          VERSION=$(cargo metadata --format-version 1 --no-deps | \
            python3 -c "import sys,json; d=json.load(sys.stdin); \
            print([p for p in d['packages'] if p['name']=='c2pa-c-ffi'][0]['version'])")

          TARGET=${{ matrix.target }}
          LIB=$PWD/target/$TARGET/release/libc2pa_c.so
          HDR=$PWD/target/$TARGET/release/c2pa.h

          if [[ "$TARGET" == aarch64* ]]; then
            DEB_ARCH=arm64
            RPM_ARCH=aarch64
          else
            DEB_ARCH=amd64
            RPM_ARCH=x86_64
          fi

          # Generate pkg-config file (no leading whitespace)
          cat > /tmp/c2pa.pc << 'PCEOF'
prefix=/usr
libdir=${prefix}/lib
includedir=${prefix}/include

Name: c2pa
Description: C2PA content authenticity library
Version: PKGVER
Libs: -L${libdir} -lc2pa_c
Cflags: -I${includedir}
PCEOF
          sed -i "s/PKGVER/$VERSION/" /tmp/c2pa.pc

          mkdir -p target/artifacts

          COMMON_ARGS=(
            --maintainer "CAI Open Source <caiopensrc@adobe.com>"
            --url "https://contentauthenticity.org"
            --license "MIT OR Apache-2.0"
          )

          # libc2pa (runtime) — shared library only
          fpm -s dir -t deb "${COMMON_ARGS[@]}" \
            --name libc2pa \
            --version "$VERSION" \
            --architecture "$DEB_ARCH" \
            --description "C2PA content authenticity shared library" \
            --package "target/artifacts/libc2pa_${VERSION}_${DEB_ARCH}.deb" \
            "$LIB=/usr/lib/libc2pa_c.so"

          # libc2pa-dev — header, linker .so, and pkg-config; depends on runtime
          fpm -s dir -t deb "${COMMON_ARGS[@]}" \
            --name libc2pa-dev \
            --version "$VERSION" \
            --architecture "$DEB_ARCH" \
            --description "C2PA content authenticity library - development files" \
            --depends "libc2pa (= $VERSION)" \
            --package "target/artifacts/libc2pa-dev_${VERSION}_${DEB_ARCH}.deb" \
            "$LIB=/usr/lib/libc2pa_c.so" \
            "$HDR=/usr/include/c2pa.h" \
            "/tmp/c2pa.pc=/usr/lib/pkgconfig/c2pa.pc"

          # libc2pa (runtime) .rpm
          fpm -s dir -t rpm "${COMMON_ARGS[@]}" \
            --name libc2pa \
            --version "$VERSION" \
            --architecture "$RPM_ARCH" \
            --description "C2PA content authenticity shared library" \
            --package "target/artifacts/libc2pa-${VERSION}-1.${RPM_ARCH}.rpm" \
            "$LIB=/usr/lib/libc2pa_c.so"

          # libc2pa-dev .rpm
          fpm -s dir -t rpm "${COMMON_ARGS[@]}" \
            --name libc2pa-dev \
            --version "$VERSION" \
            --architecture "$RPM_ARCH" \
            --description "C2PA content authenticity library - development files" \
            --depends "libc2pa = $VERSION" \
            --package "target/artifacts/libc2pa-dev-${VERSION}-1.${RPM_ARCH}.rpm" \
            "$LIB=/usr/lib/libc2pa_c.so" \
            "$HDR=/usr/include/c2pa.h" \
            "/tmp/c2pa.pc=/usr/lib/pkgconfig/c2pa.pc"

      - name: Upload build artifacts (Android)
        if: contains(matrix.target, 'android')
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-artifacts-${{ matrix.os }}-${{ matrix.target }}
          path: target-${{ matrix.target }}/artifacts/

      - name: Upload build artifacts (Non-Android)
        if: "!contains(matrix.target, 'android')"
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-artifacts-${{ matrix.os }}-${{ matrix.target }}
          path: target/artifacts/

  release:
    needs: build
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: release-artifacts-*
          path: dist
          merge-multiple: true

      - name: List downloaded artifacts
        run: ls -lh dist

      - name: Resolve release tag
        id: extract_tag
        run: |
          # Use the exact ref that triggered this run as the release tag.
          #
          # The previous approach re-derived the tag from a built zip's
          # filename with a regex (`c2pa-v[0-9]+\.[0-9]+\.[0-9]+`) that assumed
          # a bare X.Y.Z version. That silently dropped any `-rc.N` prerelease
          # suffix, so a release-candidate build was published under the FINAL
          # release name -- e.g. `c2pa-v0.90.0-rc.2` was released as
          # `c2pa-v0.90.0`, burning the name reserved for the post-bake release.
          # The triggering ref is authoritative; trust it and never reconstruct
          # the version from a filename.
          TAG_NAME="${{ github.ref_name }}"
          case "$TAG_NAME" in
            c2pa-v*) ;;
            *)
              echo "::error::Expected a c2pa-v* tag ref, got '$TAG_NAME'. Run this workflow on a c2pa-v* tag."
              exit 1
              ;;
          esac
          echo "Releasing tag: $TAG_NAME"
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"

      # Generate the release notes ourselves, scoped to the previous tag of THIS
      # crate. Tags are repo-global and interleaved across crates (c2pa-v*,
      # c2patool-v*, c2pa-c-ffi-v*), and GitHub's automatic "previous tag" is the
      # chronologically previous tag regardless of crate -- which produced
      # nonsense ranges like `c2patool-v0.26.72...c2pa-v0.90.0`. Picking the
      # previous same-crate tag keeps the changelog within this crate's history.
      - name: Generate release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ steps.extract_tag.outputs.tag_name }}"
          PREFIX="c2pa-v"
          repo="${{ github.repository }}"
          # All tags for this crate, plus the current one, sorted ascending.
          matching=$(gh api --paginate "repos/$repo/git/matching-refs/tags/$PREFIX" \
                       --jq '.[].ref' | sed 's#refs/tags/##')
          sorted=$(printf '%s\n%s\n' "$matching" "$TAG" | sort -V -u)
          # The line immediately before the current tag is its predecessor.
          prev=$(printf '%s\n' "$sorted" | { grep -F -x -B1 -- "$TAG" || true; } | head -n1)
          [ "$prev" = "$TAG" ] && prev=""
          if [ -n "$prev" ]; then
            echo "Previous $PREFIX tag: $prev"
            gh api "repos/$repo/releases/generate-notes" \
              -f tag_name="$TAG" -f previous_tag_name="$prev" --jq .body > release-notes.md
          else
            echo "No previous $PREFIX tag; letting GitHub choose the range."
            gh api "repos/$repo/releases/generate-notes" \
              -f tag_name="$TAG" --jq .body > release-notes.md
          fi
          echo "----- release notes -----"; cat release-notes.md

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: ${{ steps.extract_tag.outputs.tag_name }}
          # Attach the release to the commit the triggering tag points at, never
          # the default branch (a safety net against creating a stray tag).
          target_commitish: ${{ github.sha }}
          body_path: release-notes.md
          files: dist/*
          draft: false
          prerelease: true

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
